<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - 웹프로그래밍 데모</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-box {
        max-width: 500px;
        margin: 20px 0;
        padding: 24px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: #fafafa;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
      }
      .form-group input[type="radio"],
      .form-group input[type="checkbox"] {
        width: auto;
        margin-right: 6px;
      }
      .submit-btn {
        padding: 10px 30px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        cursor: pointer;
      }
      .submit-btn:hover {
        background-color: #2980b9;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li><a href="/">Home</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/contact">Contact</a></li>
          <li><a href="/list">목록</a></li>
          <li><a href="/timetable">시간표</a></li>
          <li><a href="/media">미디어</a></li>
          <li><a href="/register">회원가입</a></li>
        </ul>
      </div>
    </nav>

    <section class="main">
      <div class="container">
        <h1>사용자 등록 (Register)</h1>
        <p>아래 양식을 작성하여 회원가입을 진행하세요.</p>
        <hr />

        <div class="form-box">
          <form action="#" method="post">

            <div class="form-group">
              <label for="username">아이디</label>
              <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required />
            </div>

            <div class="form-group">
              <label for="password">비밀번호</label>
              <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required />
            </div>

            <div class="form-group">
              <label for="email">이메일</label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required />
            </div>

            <div class="form-group">
              <label for="birth">생년월일</label>
              <input type="date" id="birth" name="birth" />
            </div>

            <div class="form-group">
              <label>성별</label><br />
              <input type="radio" name="gender" value="male" id="male" />
              <label for="male" style="display:inline; font-weight:normal;">남성</label>
              &nbsp;
              <input type="radio" name="gender" value="female" id="female" />
              <label for="female" style="display:inline; font-weight:normal;">여성</label>
            </div>

            <div class="form-group">
              <label for="major">전공</label>
              <select id="major" name="major">
                <option value="">-- 선택하세요 --</option>
                <option value="cs">컴퓨터공학</option>
                <option value="sw">소프트웨어학</option>
                <option value="sec">정보보안학</option>
              </select>
            </div>

            <div class="form-group">
              <label>관심 분야 (중복 선택 가능)</label><br />
              <input type="checkbox" name="interest" value="web" id="web" />
              <label for="web" style="display:inline; font-weight:normal;">웹 개발</label>
              &nbsp;
              <input type="checkbox" name="interest" value="sec" id="sec" />
              <label for="sec" style="display:inline; font-weight:normal;">보안</label>
              &nbsp;
              <input type="checkbox" name="interest" value="ai" id="ai" />
              <label for="ai" style="display:inline; font-weight:normal;">인공지능</label>
            </div>

            <div class="form-group">
              <label for="intro">자기소개</label>
              <textarea id="intro" name="intro" rows="3" placeholder="간단한 자기소개를 입력하세요"></textarea>
            </div>

            <button type="submit" class="submit-btn">가입하기</button>
            &nbsp;
            <button type="reset" class="submit-btn" style="background-color:#aaa;">초기화</button>

          </form>
        </div>
      </div>
    </section>
  </body>
</html>
