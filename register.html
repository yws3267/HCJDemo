<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹프로그래밍 데모</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-box {
        max-width: 480px;
        margin: 10px 0;
        padding: 20px 24px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background-color: #fafafa;
      }
      .form-group {
        margin-bottom: 14px;
      }
      .form-group label {
        display: block;
        margin-bottom: 4px;
        font-weight: bold;
      }
      .form-group input[type="text"],
      .form-group input[type="password"],
      .form-group input[type="email"],
      .form-group input[type="date"],
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid #bbb;
        border-radius: 4px;
        font-size: 15px;
        box-sizing: border-box;
      }
      .form-group input[type="radio"],
      .form-group input[type="checkbox"] {
        margin-right: 5px;
      }
      .inline-label {
        font-weight: normal;
        margin-right: 14px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="list.html">목록</a></li>
          <li><a href="timetable.html">시간표</a></li>
          <li><a href="media.html">미디어</a></li>
          <li><a href="register.html">회원가입</a></li>
        </ul>
      </div>
    </nav>

    <section class="main">
      <div class="container">
        <h1>사용자 등록 (Register)</h1>
        <p>아래 양식을 작성하여 회원가입을 진행하세요.</p>
        <hr />

        <div class="form-box">
          <form action="#" method="post">

            <div class="form-group">
              <label for="username">아이디</label>
              <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required />
            </div>

            <div class="form-group">
              <label for="password">비밀번호</label>
              <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required />
            </div>

            <div class="form-group">
              <label for="email">이메일</label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required />
            </div>

            <div class="form-group">
              <label for="birth">생년월일</label>
              <input type="date" id="birth" name="birth" />
            </div>

            <div class="form-group">
              <label>성별</label><br />
              <input type="radio" name="gender" value="male" id="male" />
              <label for="male" class="inline-label">남성</label>
              <input type="radio" name="gender" value="female" id="female" />
              <label for="female" class="inline-label">여성</label>
            </div>

            <div class="form-group">
              <label for="major">전공</label>
              <select id="major" name="major">
                <option value="">-- 선택하세요 --</option>
                <option value="cs">컴퓨터공학</option>
                <option value="sw">소프트웨어학</option>
                <option value="sec">정보보호학</option>
              </select>
            </div>

            <div class="form-group">
              <label>관심 분야</label><br />
              <input type="checkbox" name="interest" value="web" id="web" />
              <label for="web" class="inline-label">웹 개발</label>
              <input type="checkbox" name="interest" value="sec" id="sec" />
              <label for="sec" class="inline-label">보안</label>
              <input type="checkbox" name="interest" value="ai" id="ai" />
              <label for="ai" class="inline-label">인공지능</label>
            </div>

            <div class="form-group">
              <label for="intro">자기소개</label>
              <textarea id="intro" name="intro" rows="3" placeholder="간단한 자기소개를 입력하세요"></textarea>
            </div>

            <button type="submit">가입하기</button>
            <button type="reset">초기화</button>

          </form>
        </div>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
