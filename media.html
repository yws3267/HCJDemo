  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>웹프로그래밍 데모</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .media-box {
        margin: 10px 0 20px 0;
        padding: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background-color: #fafafa;
        display: inline-block;
      }
      audio, video {
        display: block;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="list.html">List</a></li>
          <li><a href="timetable.html">Timetable</a></li>
          <li><a href="media.html">Media</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </div>
    </nav>

    <section class="main">
      <div class="container">
        <h1>미디어 (Media)</h1>
        <p>HTML5 audio, video 태그 예제입니다.</p>
        <hr />

        <h2>🎵 오디오 (Audio)</h2>

        <div class="media-box">
          <p><strong>샘플 오디오 1</strong> - 말 울음소리 (MP3)</p>
          <audio controls>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg" />
            이 브라우저는 audio 태그를 지원하지 않습니다.
          </audio>
        </div>

        <br />

        <div class="media-box">
          <p><strong>샘플 오디오 2</strong> - 말 울음소리 (OGG, MP3 순서 지정)</p>
          <audio controls>
            <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg" />
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg" />
            이 브라우저는 audio 태그를 지원하지 않습니다.
          </audio>
        </div>

        <hr />

        <h2>🎬 동영상 (Video)</h2>

        <div class="media-box">
          <p><strong>샘플 동영상 1</strong> - Big Buck Bunny (MP4)</p>
          <video width="400" controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
            <source src="https://www.w3schools.com/html/mov_bbb.ogg" type="video/ogg" />
            이 브라우저는 video 태그를 지원하지 않습니다.
          </video>
        </div>

        <br />

        <div class="media-box">
          <p><strong>샘플 동영상 2</strong> - autoplay + muted + loop 속성 적용</p>
          <video width="400" autoplay muted loop controls>
            <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4" />
            이 브라우저는 video 태그를 지원하지 않습니다.
          </video>
        </div>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
